<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaatPake Search</title>
<style>
:root{--primary:#8B1E3F;--accent:#D4AF37;--bg:#FFF8F8;--card:#fff;--text:#2C2C2C}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;user-select:none;-webkit-user-select:none}
input,select,textarea{user-select:text;-webkit-user-select:text}
body{background:var(--bg);color:var(--text);padding-bottom:80px}
.header{height:64px;background:white;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(139,30,63,.12);position:sticky;top:0;z-index:9}
.header h1{font-size:24px;color:var(--primary);font-family:Georgia,serif}
.box{padding:16px}
.search-card{background:white;border-radius:18px;padding:14px;box-shadow:0 8px 22px rgba(139,30,63,.12)}
.input{width:100%;height:48px;border:1px solid #ead7dc;border-radius:14px;padding:0 14px;margin-bottom:10px;font-weight:700}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.profile-list{padding:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 8px 22px rgba(139,30,63,.12)}
.card img{width:100%;height:165px;object-fit:cover;background:#eee}
.info{padding:10px}
.info h3{font-size:15px;color:var(--primary);margin-bottom:4px}
.info p{font-size:12px;color:#555;margin-bottom:3px}
.btn{width:100%;border:none;background:var(--primary);color:white;padding:9px;border-radius:12px;font-weight:900;margin-top:7px}
.fav{background:var(--accent);color:#3b2500}
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;height:68px;background:white;display:flex;justify-content:space-around;align-items:center;box-shadow:0 -5px 20px rgba(139,30,63,.16);z-index:99;border-radius:22px 22px 0 0}
.nav-item{text-decoration:none;color:#777;font-size:11px;text-align:center;width:20%}
.nav-item span{display:block;font-size:22px;margin-bottom:3px}
.nav-item.active{color:var(--primary);font-weight:bold}
</style>
</head>
<body>

<header class="header"><h1>Search Profiles</h1></header>

<div class="box">
  <div class="search-card">
    <input class="input" id="searchText" placeholder="Search by name district profession" oninput="loadProfiles()">
    <div class="filters">
      <select class="input" id="genderFilter" onchange="loadProfiles()">
        <option value="">All</option><option>Bride</option><option>Groom</option>
      </select>
      <select class="input" id="ageFilter" onchange="loadProfiles()">
        <option value="">Age</option><option value="18-25">18-25</option><option value="26-30">26-30</option><option value="31-40">31-40</option>
      </select>
    </div>
  </div>
</div>

<section class="profile-list" id="profileList"></section>

<nav class="bottom-nav">
  <a href="home.html" class="nav-item"><span>🏠</span>Home</a>
  <a href="search.html" class="nav-item active"><span>🔍</span>Search</a>
  <a href="favourites.html" class="nav-item"><span>❤️</span>Favourites</a>
  <a href="register.html" class="nav-item"><span>➕</span>Register</a>
  <a href="profile.html" class="nav-item"><span>👤</span>Profile</a>
</nav>

<script>
const demo=[
{name:"Ananya Das",age:25,gender:"Bride",district:"Kolkata",profession:"Teacher",img:"https://via.placeholder.com/400x500?text=Bride"},
{name:"Rahul Sen",age:29,gender:"Groom",district:"Howrah",profession:"Engineer",img:"https://via.placeholder.com/400x500?text=Groom"},
{name:"Priya Roy",age:24,gender:"Bride",district:"Hooghly",profession:"Nurse",img:"https://via.placeholder.com/400x500?text=Bride"},
{name:"Subhojit Dey",age:31,gender:"Groom",district:"Kolkata",profession:"Govt Job",img:"https://via.placeholder.com/400x500?text=Groom"}
];

function getProfiles(){
return JSON.parse(localStorage.getItem("saatpakeProfiles")||"[]").concat(demo);
}

function saveFav(p){
let favs=JSON.parse(localStorage.getItem("saatpakeFavs")||"[]");
if(!favs.find(x=>x.name===p.name)){favs.push(p)}
localStorage.setItem("saatpakeFavs",JSON.stringify(favs));
alert("Added to favourites");
}

function loadProfiles(){
let text=document.getElementById("searchText").value.toLowerCase();
let gender=document.getElementById("genderFilter").value;
let age=document.getElementById("ageFilter").value;
let list=document.getElementById("profileList");
let data=getProfiles().filter(p=>{
let ok=true;
if(text) ok=(p.name+p.district+p.profession).toLowerCase().includes(text);
if(gender) ok=ok && p.gender===gender;
if(age){
let [a,b]=age.split("-").map(Number);
ok=ok && Number(p.age)>=a && Number(p.age)<=b;
}
return ok;
});
list.innerHTML=data.map((p,i)=>`
<div class="card">
<img src="${p.img}">
<div class="info">
<h3>${p.name}</h3>
<p>${p.age} Years • ${p.gender}</p>
<p>${p.district}</p>
<p>${p.profession}</p>
<button class="btn fav" onclick='saveFav(${JSON.stringify(p)})'>Favourite</button>
</div>
</div>`).join("");
}
loadProfiles();
</script>
<script src="config.js"></script>
<script src="common.js"></script>
</body>
</html>
