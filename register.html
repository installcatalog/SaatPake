<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaatPake - Register</title>

<style>
:root{
  --primary:#8B1E3F;
  --accent:#D4AF37;
  --bg:#FFF8F8;
  --card:#FFFFFF;
  --text:#2C2C2C;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  padding-bottom:80px;
}

.header{
  height:65px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 18px rgba(139,30,63,.12);
  position:sticky;
  top:0;
  z-index:100;
}

.header h1{
  color:var(--primary);
  font-size:24px;
  font-family:Georgia,serif;
}

.hero{
  padding:20px 16px 10px;
  text-align:center;
}

.hero h2{
  color:var(--primary);
  margin-bottom:8px;
}

.hero p{
  color:#666;
  line-height:22px;
}

.notice{
  margin:12px 16px;
  background:#fff;
  border-left:5px solid var(--accent);
  border-radius:16px;
  padding:14px;
  box-shadow:0 8px 22px rgba(139,30,63,.08);
}

.notice strong{
  color:var(--primary);
}

.form-box{
  margin:14px 16px;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 8px 22px rgba(139,30,63,.12);
}

.form-box iframe{
  width:100%;
  height:2300px;
  border:none;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:68px;
  background:#fff;
  display:flex;
  justify-content:space-around;
  align-items:center;
  box-shadow:0 -5px 20px rgba(139,30,63,.16);
  z-index:200;
  border-radius:22px 22px 0 0;
}

.nav-item{
  text-decoration:none;
  color:#777;
  font-size:11px;
  text-align:center;
  width:20%;
}

.nav-item span{
  display:block;
  font-size:22px;
  margin-bottom:3px;
}

.nav-item.active{
  color:var(--primary);
  font-weight:bold;
}
</style>
</head>

<body>

<header class="header">
  <h1>SaatPake</h1>
</header>

<section class="hero">
  <h2>Create Your Matrimony Profile</h2>
  <p>
    Register your profile and connect with genuine marriage seekers.
  </p>
</section>

<div class="notice">
  <strong>Important:</strong><br>
  Your profile will be reviewed by admin before being published on SaatPake.
</div>

<div class="form-box">

<iframe
src="https://docs.google.com/forms/d/e/1FAIpQLScMdYoX1Gw0Rk1oAJFuEspbuIw5OzBlbq_8K1RtVZBQ8QGxOw/viewform?embedded=true">
Loading...
</iframe>

</div>

<nav class="bottom-nav">
  <a href="home.html" class="nav-item">
    <span>🏠</span>Home
  </a>

  <a href="search.html" class="nav-item">
    <span>🔍</span>Search
  </a>

  <a href="favourites.html" class="nav-item">
    <span>❤️</span>Favourites
  </a>

  <a href="register.html" class="nav-item active">
    <span>➕</span>Register
  </a>

  <a href="profile.html" class="nav-item">
    <span>👤</span>Profile
  </a>
</nav>

<script src="config.js"></script>
<script src="common.js"></script>

</body>
</html>
