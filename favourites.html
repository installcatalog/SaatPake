<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaatPake Favourites</title>
<style>
:root{--primary:#8B1E3F;--accent:#D4AF37;--bg:#FFF8F8;--text:#2C2C2C}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;user-select:none}
body{background:var(--bg);color:var(--text);padding-bottom:80px}
.header{height:64px;background:white;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(139,30,63,.12)}
.header h1{font-size:24px;color:var(--primary);font-family:Georgia,serif}
.list{padding:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 8px 22px rgba(139,30,63,.12)}
.card img{width:100%;height:165px;object-fit:cover;background:#eee}
.info{padding:10px}.info h3{font-size:15px;color:var(--primary);margin-bottom:4px}.info p{font-size:12px;color:#555;margin-bottom:3px}
.btn{width:100%;border:none;background:var(--primary);color:white;padding:9px;border-radius:12px;font-weight:900;margin-top:7px}
.empty{text-align:center;padding:40px 20px;color:#777;font-weight:800}
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;height:68px;background:white;display:flex;justify-content:space-around;align-items:center;box-shadow:0 -5px 20px rgba(139,30,63,.16);z-index:99;border-radius:22px 22px 0 0}
.nav-item{text-decoration:none;color:#777;font-size:11px;text-align:center;width:20%}.nav-item span{display:block;font-size:22px;margin-bottom:3px}.nav-item.active{color:var(--primary);font-weight:bold}
</style>
</head>
<body>

<header class="header"><h1>Favourites</h1></header>
<section class="list" id="favList"></section>

<nav class="bottom-nav">
  <a href="home.html" class="nav-item"><span>🏠</span>Home</a>
  <a href="search.html" class="nav-item"><span>🔍</span>Search</a>
  <a href="favourites.html" class="nav-item active"><span>❤️</span>Favourites</a>
  <a href="register.html" class="nav-item"><span>➕</span>Register</a>
  <a href="profile.html" class="nav-item"><span>👤</span>Profile</a>
</nav>

<script>
function removeFav(i){
let favs=JSON.parse(localStorage.getItem("saatpakeFavs")||"[]");
favs.splice(i,1);
localStorage.setItem("saatpakeFavs",JSON.stringify(favs));
loadFavs();
}
function loadFavs(){
let favs=JSON.parse(localStorage.getItem("saatpakeFavs")||"[]");
let box=document.getElementById("favList");
if(!favs.length){box.innerHTML='<div class="empty">No favourite profile saved</div>';return}
box.innerHTML=favs.map((p,i)=>`
<div class="card">
<img src="${p.img}">
<div class="info">
<h3>${p.name}</h3>
<p>${p.age} Years • ${p.gender}</p>
<p>${p.district}</p>
<p>${p.profession}</p>
<button class="btn" onclick="removeFav(${i})">Remove</button>
</div>
</div>`).join("");
}
loadFavs();
</script>

</body>
</html>
