<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaatPake - Favourites</title>

<style>
:root{
  --primary:#8B1E3F;
  --accent:#D4AF37;
  --bg:#FFF8F8;
  --card:#FFFFFF;
  --text:#2C2C2C;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
  user-select:none;
  -webkit-user-select:none;
}

body{
  background:var(--bg);
  color:var(--text);
  padding-bottom:85px;
}

.header{
  height:65px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 18px rgba(139,30,63,.12);
  position:sticky;
  top:0;
  z-index:100;
}

.header h1{
  font-size:24px;
  color:var(--primary);
  font-family:Georgia,serif;
}

.list{
  padding:16px 14px 20px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 22px rgba(139,30,63,.12);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  background:#eee;
}

.info{
  padding:10px;
}

.info h3{
  font-size:15px;
  color:var(--primary);
  margin-bottom:4px;
}

.info p{
  font-size:12px;
  color:#555;
  margin-bottom:3px;
}

.btn{
  width:100%;
  border:none;
  padding:9px;
  border-radius:12px;
  font-weight:900;
  margin-top:7px;
}

.view-btn{
  background:var(--primary);
  color:white;
}

.remove-btn{
  background:white;
  color:var(--primary);
  border:2px solid var(--accent);
}

.empty{
  grid-column:1/-1;
  text-align:center;
  padding:45px 20px;
  color:#777;
  font-weight:900;
  line-height:24px;
}

.empty button{
  margin-top:16px;
  border:none;
  background:var(--primary);
  color:white;
  padding:12px 22px;
  border-radius:14px;
  font-weight:900;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:68px;
  background:white;
  display:flex;
  justify-content:space-around;
  align-items:center;
  box-shadow:0 -5px 20px rgba(139,30,63,.16);
  z-index:200;
  border-radius:22px 22px 0 0;
}

.nav-item{
  text-decoration:none;
  color:#777;
  font-size:11px;
  text-align:center;
  width:20%;
}

.nav-item span{
  display:block;
  font-size:22px;
  margin-bottom:3px;
}

.nav-item.active{
  color:var(--primary);
  font-weight:bold;
}
</style>
</head>

<body>

<header class="header">
  <h1>Favourites</h1>
</header>

<section class="list" id="favList"></section>

<nav class="bottom-nav">
  <a href="home.html" class="nav-item"><span>🏠</span>Home</a>
  <a href="search.html" class="nav-item"><span>🔍</span>Search</a>
  <a href="favourites.html" class="nav-item active"><span>❤️</span>Favourites</a>
  <a href="register.html" class="nav-item"><span>➕</span>Register</a>
  <a href="profile.html" class="nav-item"><span>👤</span>Profile</a>
</nav>

<script src="config.js"></script>
<script src="common.js"></script>

<script>
function getPhoto(profile){
  return profile["Upload Your Recent Clear Photo (No Sunglasses)"] ||
         profile["Upload your Clear Recent Pic (No Sunglass)"] ||
         profile["Upload Your Recent Clear Photo"] ||
         profile["Photo"] ||
         CONFIG.DEFAULT_IMAGE;
}

function cleanGender(gender){
  gender = String(gender || "");
  if(gender.toLowerCase().includes("groom")) return "Groom";
  if(gender.toLowerCase().includes("bride")) return "Bride";
  if(gender.toLowerCase().includes("men")) return "Groom";
  if(gender.toLowerCase().includes("women")) return "Bride";
  return gender;
}

function loadFavourites(){
  const box = document.getElementById("favList");
  const favs = JSON.parse(localStorage.getItem("saatpakeFavs") || "[]");

  if(!favs.length){
    box.innerHTML = `
      <div class="empty">
        No favourite profile saved yet
        <br>
        Open profiles and tap Add to Favourites
        <br>
        <button onclick="location.href='search.html'">Search Profiles</button>
      </div>
    `;
    return;
  }

  box.innerHTML = "";

  favs.forEach((profile,index) => {
    const name = profile.Name || "SaatPake User";
    const age = profile.Age || "";
    const gender = cleanGender(profile.Gender);
    const district = profile.District || "";
    const religion = profile.Religion || "";
    const profession = profile.Profession || "";
    const img = getPhoto(profile);

    box.innerHTML += `
      <div class="card">
        <img src="${img}" alt="${name}" onerror="this.src='${CONFIG.DEFAULT_IMAGE}'">

        <div class="info">
          <h3>${name}</h3>
          <p>${age} Years • ${gender}</p>
          <p>${district}</p>
          <p>${religion}</p>
          <p>${profession}</p>

          <button class="btn view-btn" onclick='viewProfile(${JSON.stringify(profile)})'>
            View Profile
          </button>

          <button class="btn remove-btn" onclick="removeFavourite(${index})">
            Remove
          </button>
        </div>
      </div>
    `;
  });
}

function viewProfile(profile){
  localStorage.setItem("selectedProfile", JSON.stringify(profile));
  window.location.href = "profile.html";
}

function removeFavourite(index){
  let favs = JSON.parse(localStorage.getItem("saatpakeFavs") || "[]");
  favs.splice(index,1);
  localStorage.setItem("saatpakeFavs", JSON.stringify(favs));
  loadFavourites();
}

loadFavourites();
</script>

</body>
</html>
