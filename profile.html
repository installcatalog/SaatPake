<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaatPake - Profile</title>

<style>
:root{
  --primary:#8B1E3F;
  --accent:#D4AF37;
  --bg:#FFF8F8;
  --card:#FFFFFF;
  --text:#2C2C2C;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
  user-select:none;
  -webkit-user-select:none;
}

body{
  background:var(--bg);
  color:var(--text);
  padding-bottom:85px;
}

.header{
  height:65px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 18px rgba(139,30,63,.12);
  position:sticky;
  top:0;
  z-index:100;
}

.header h1{
  font-size:24px;
  color:var(--primary);
  font-family:Georgia,serif;
}

.wrap{
  padding:16px;
}

.card{
  background:white;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(139,30,63,.14);
}

.photo{
  width:100%;
  height:330px;
  object-fit:cover;
  background:#eee;
}

.info{
  padding:16px;
}

.profile-id{
  display:inline-block;
  background:#FFF3CF;
  color:#7a4d00;
  padding:7px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  margin-bottom:10px;
}

.name{
  font-size:26px;
  color:var(--primary);
  font-weight:900;
  margin-bottom:8px;
}

.line{
  font-size:14px;
  color:#555;
  margin-bottom:8px;
  line-height:22px;
}

.label{
  font-weight:900;
  color:var(--primary);
}

.btn{
  width:100%;
  height:52px;
  border:none;
  border-radius:16px;
  font-size:16px;
  font-weight:900;
  margin-top:12px;
}

.contact-btn{
  background:linear-gradient(135deg,var(--primary),#5b1028);
  color:white;
}

.fav-btn{
  background:white;
  color:var(--primary);
  border:2px solid var(--accent);
}

.empty{
  text-align:center;
  padding:40px 20px;
  font-weight:900;
  color:#777;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:68px;
  background:white;
  display:flex;
  justify-content:space-around;
  align-items:center;
  box-shadow:0 -5px 20px rgba(139,30,63,.16);
  z-index:200;
  border-radius:22px 22px 0 0;
}

.nav-item{
  text-decoration:none;
  color:#777;
  font-size:11px;
  text-align:center;
  width:20%;
}

.nav-item span{
  display:block;
  font-size:22px;
  margin-bottom:3px;
}

.nav-item.active{
  color:var(--primary);
  font-weight:bold;
}
</style>
</head>

<body>

<header class="header">
  <h1>Profile Details</h1>
</header>

<section class="wrap">
  <div id="profileBox"></div>
</section>

<nav class="bottom-nav">
  <a href="home.html" class="nav-item"><span>🏠</span>Home</a>
  <a href="search.html" class="nav-item"><span>🔍</span>Search</a>
  <a href="favourites.html" class="nav-item"><span>❤️</span>Favourites</a>
  <a href="register.html" class="nav-item"><span>➕</span>Register</a>
  <a href="profile.html" class="nav-item active"><span>👤</span>Profile</a>
</nav>

<script src="config.js"></script>
<script src="common.js"></script>

<script>
function getPhoto(profile){
  return profile["Upload Your Recent Clear Photo (No Sunglasses)"] ||
         profile["Upload your Clear Recent Pic (No Sunglass)"] ||
         profile["Upload Your Recent Clear Photo"] ||
         profile["Photo"] ||
         CONFIG.DEFAULT_IMAGE;
}

function cleanGender(gender){
  gender = String(gender || "");
  if(gender.toLowerCase().includes("groom")) return "Groom";
  if(gender.toLowerCase().includes("bride")) return "Bride";
  if(gender.toLowerCase().includes("men")) return "Groom";
  if(gender.toLowerCase().includes("women")) return "Bride";
  return gender;
}

function val(profile,key){
  return profile[key] || "Not mentioned";
}

function loadProfile(){
  const box = document.getElementById("profileBox");
  const profile = JSON.parse(localStorage.getItem("selectedProfile") || "null");

  if(!profile){
    box.innerHTML = `
      <div class="card">
        <div class="empty">
          No profile selected<br><br>
          Please open a profile from Home or Search page
        </div>
      </div>
    `;
    return;
  }

  const img = getPhoto(profile);
  const profileId = profile.ProfileID || "Not Assigned";
  const name = profile.Name || "SaatPake User";
  const gender = cleanGender(profile.Gender);

  box.innerHTML = `
    <div class="card">
      <img class="photo" src="${img}" onerror="this.src='${CONFIG.DEFAULT_IMAGE}'">

      <div class="info">
        <div class="profile-id">Profile ID: ${profileId}</div>

        <div class="name">${name}</div>

        <div class="line"><span class="label">Age:</span> ${val(profile,"Age")} Years</div>
        <div class="line"><span class="label">Gender:</span> ${gender}</div>
        <div class="line"><span class="label">Marital Status:</span> ${val(profile,"Marital Status")}</div>
        <div class="line"><span class="label">Height:</span> ${val(profile,"Height")}</div>
        <div class="line"><span class="label">Religion:</span> ${val(profile,"Religion")}</div>
        <div class="line"><span class="label">Caste:</span> ${val(profile,"Caste")}</div>
        <div class="line"><span class="label">Education:</span> ${val(profile,"Education")}</div>
        <div class="line"><span class="label">Profession:</span> ${val(profile,"Profession")}</div>
        <div class="line"><span class="label">Profession Details:</span> ${val(profile,"If Employed, Choose Profession Details. Otherwise, Skip This Section.")}</div>
        <div class="line"><span class="label">Monthly Income:</span> ${val(profile,"Monthly Income")}</div>
        <div class="line"><span class="label">District:</span> ${val(profile,"District")}</div>
        <div class="line"><span class="label">Police Station:</span> ${val(profile,"Location (Write your Police station)")}</div>

        <button class="btn contact-btn" onclick="getContactDetails()">Get Contact Details</button>
        <button class="btn fav-btn" onclick="addFavourite()">❤️ Add to Favourites</button>
      </div>
    </div>
  `;
}

function getContactDetails(){
  const profile = JSON.parse(localStorage.getItem("selectedProfile") || "null");
  if(!profile){
    alert("No profile selected");
    return;
  }

  const msg =
`Hello Admin,

I am interested in this SaatPake profile.

Profile ID: ${profile.ProfileID || "Not Assigned"}
Name: ${profile.Name || ""}
Age: ${profile.Age || ""}
Gender: ${cleanGender(profile.Gender)}
District: ${profile.District || ""}

Please share contact details.`;

  const url = `https://wa.me/${CONFIG.ADMIN_WHATSAPP}?text=${encodeURIComponent(msg)}`;
  window.open(url,"_blank");
}

function addFavourite(){
  const profile = JSON.parse(localStorage.getItem("selectedProfile") || "null");
  if(!profile){
    alert("No profile selected");
    return;
  }

  let favs = JSON.parse(localStorage.getItem("saatpakeFavs") || "[]");

  if(favs.find(p => p.ProfileID === profile.ProfileID)){
    alert("Already added to favourites");
    return;
  }

  favs.push(profile);
  localStorage.setItem("saatpakeFavs", JSON.stringify(favs));
  alert("Added to favourites");
}

loadProfile();
</script>

</body>
</html>
